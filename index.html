<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBP Smart Home</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d001a">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DBP">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --bg-base: #0a0812;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --primary-purple: #8a2be2;
            --accent-pink: #d500f9;
            --text-main: #ffffff;
            --text-light: #f0e6ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 50% 0%, #2a1b40 0%, #0a0812 60%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 20px 80px 20px;
            overflow-x: hidden;
            user-select: none;
        }

        /* PWA Install Banner */
        #installBanner {
            display: none; background: rgba(138, 43, 226, 0.2); border: 1px solid var(--primary-purple);
            border-radius: 12px; padding: 12px 20px; margin: 0 auto 20px; max-width: 400px;
            justify-content: space-between; align-items: center;
        }
        #installBanner span { font-size: 0.95rem; font-weight: 500; color: var(--text-main); }
        #installBtn {
            background: var(--primary-purple); color: white; border: none; padding: 8px 16px; 
            border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 0.9rem;
        }

        /* Centered Header */
        header { text-align: center; margin: 30px 0 30px; }
        h1 { font-weight: 600; font-size: 2.8rem; letter-spacing: 1px; color: var(--text-main); margin-bottom: 5px; }
        p.subtitle { color: var(--text-light); font-size: 1.1rem; }

        /* Status Bar */
        .system-overview { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .stat-pill {
            background: var(--glass-bg); border: 1px solid var(--glass-border); 
            border-radius: 12px; padding: 10px 20px; display: flex; align-items: center; gap: 10px;
        }
        .stat-value { font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
        .stat-label { font-size: 0.9rem; color: var(--text-light); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #ff4d4d; }
        .status-dot.online { background-color: #00e676; }

        /* Grid */
        .dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; max-width: 1000px; margin: 0 auto;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 25px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .device-info h2 { font-size: 1.4rem; font-weight: 500; color: var(--text-main); }
        .device-info p { font-size: 1rem; color: var(--text-light); margin-top: 5px; }
        .device-pin { font-size: 0.85rem; color: #d500f9; font-weight: 500; }

        /* Highly Visible Action Buttons */
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .action-btn { 
            flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            color: var(--text-main); padding: 8px; border-radius: 8px; font-size: 0.9rem; 
            cursor: pointer; transition: 0.2s; font-weight: 500; text-align: center;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-delete { border-color: rgba(255, 77, 77, 0.5); color: #ff9999; }
        .btn-delete:hover { background: rgba(255, 77, 77, 0.2); }

        /* Big Toggle Switch */
        .switch-container { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .switch { position: relative; display: inline-block; width: 70px; height: 40px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1); transition: .4s; border-radius: 40px; 
            border: 2px solid var(--glass-border);
        }
        .slider:before {
            position: absolute; content: ""; height: 30px; width: 30px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background: linear-gradient(135deg, var(--primary-purple), var(--accent-pink)); border-color: transparent; }
        input:checked + .slider:before { transform: translateX(30px); }

        /* Add Device Card */
        .add-card { 
            border: 2px dashed rgba(255, 255, 255, 0.4); background: rgba(0, 0, 0, 0.2);
            cursor: pointer; justify-content: center; align-items: center; min-height: 180px; transition: 0.2s;
        }
        .add-card:hover { border-color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        .add-card h2 { color: var(--text-main); font-size: 1.3rem; font-weight: 500; }

        /* Simple Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1a1625; border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 30px; width: 90%; max-width: 400px; text-align: center;
        }
        .modal-content h2 { color: var(--text-main); margin-bottom: 20px; font-weight: 500; }
        .modal-content input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.5); color: var(--text-main); font-size: 1rem;
        }
        .modal-content input:focus { outline: none; border-color: var(--accent-pink); }
        
        .btn {
            background: var(--primary-purple); color: white; border: none; padding: 14px; 
            border-radius: 10px; cursor: pointer; font-weight: 500; width: 100%; margin-top: 15px; font-size: 1rem; 
        }
        .btn-cancel { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; margin-top: 10px; }

        /* Toast */
        #toast {
            visibility: hidden; background: #1a1625; border: 1px solid var(--glass-border); 
            color: var(--text-main); text-align: center; border-radius: 10px; padding: 15px; 
            position: fixed; z-index: 2000; left: 50%; bottom: 20px; transform: translateX(-50%); 
            font-size: 1rem; opacity: 0; transition: 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 40px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="installBanner">
        <span>Install App to Home Screen</span>
        <button id="installBtn">Install</button>
    </div>

    <header>
        <h1>DBP</h1>
        <p class="subtitle">Smart Home</p>
    </header>

    <div class="system-overview">
        <div class="stat-pill">
            <div class="status-dot" id="statusDot"></div>
            <span class="stat-label" id="statusText">Connecting...</span>
        </div>
        <div class="stat-pill">
            <span class="stat-value" id="activeCount">0</span>
            <span class="stat-label">Devices ON</span>
        </div>
    </div>

    <div class="dashboard" id="devices-container"></div>

    <div class="modal" id="deviceModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Device</h2>
            <input type="hidden" id="deviceId">
            <input type="text" id="deviceName" placeholder="Device Name (e.g. Fan)">
            <input type="number" id="devicePin" placeholder="ESP32 Pin Number (e.g. 2)">
            <button class="btn" id="saveBtn">Save Device</button>
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <div id="toast">Message</div>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBanner.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBanner.style.display = 'none';
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBb3RrCnOXQ5dVuLMpynM-GyfyLwTgA83Y",
            authDomain: "home-automation-pwa-6d62d.firebaseapp.com",
            projectId: "home-automation-pwa-6d62d",
            storageBucket: "home-automation-pwa-6d62d.firebasestorage.app",
            messagingSenderId: "967454972896",
            appId: "1:967454972896:web:29fe32e6ac5038ec712985",
            measurementId: "G-2LXWPR9SFG",
            databaseURL: "https://home-automation-pwa-6d62d-default-rtdb.firebaseio.com/" 
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('devices-container');
        const activeCountElem = document.getElementById('activeCount');

        db.ref('.info/connected').on('value', snap => {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            if (snap.val() === true) {
                dot.classList.add('online'); txt.innerText = "Connected";
            } else {
                dot.classList.remove('online'); txt.innerText = "Offline";
            }
        });

        db.ref('devices').on('value', snapshot => {
            container.innerHTML = ''; 
            let activeDevices = 0;

            snapshot.forEach(child => {
                const id = child.key; const data = child.val();
                if (data.state) activeDevices++;

                const card = document.createElement('div'); 
                card.className = 'glass-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="device-info">
                            <h2>${data.name}</h2>
                            <span class="device-pin">Pin: ${data.pin}</span>
                        </div>
                    </div>
                    <div class="switch-container">
                        <p style="color: ${data.state ? 'var(--text-main)' : 'var(--text-light)'}; font-size: 1.1rem;">
                            ${data.state ? 'Status: ON' : 'Status: OFF'}
                        </p>
                        <label class="switch">
                            <input type="checkbox" id="toggle-${id}" ${data.state ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="actions">
                        <button class="action-btn" onclick="openModal('${id}', '${data.name}', ${data.pin})">Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteDevice('${id}')">Delete</button>
                    </div>
                `;
                container.appendChild(card);
                
                document.getElementById(`toggle-${id}`).addEventListener('change', e => {
                    db.ref(`devices/${id}`).update({ state: e.target.checked });
                });
            });

            activeCountElem.innerText = activeDevices;

            const addCard = document.createElement('div'); 
            addCard.className = 'glass-card add-card';
            addCard.innerHTML = `<h2>+ Add Device</h2>`; 
            addCard.onclick = () => openModal();
            container.appendChild(addCard);
        });

        const modal = document.getElementById('deviceModal');
        window.openModal = (id = '', name = '', pin = '') => {
            document.getElementById('deviceId').value = id;
            document.getElementById('deviceName').value = name;
            document.getElementById('devicePin').value = pin;
            document.getElementById('modalTitle').innerText = id ? "Edit Device" : "Add Device";
            modal.classList.add('show');
        };
        window.closeModal = () => modal.classList.remove('show');

        document.getElementById('saveBtn').addEventListener('click', () => {
            const name = document.getElementById('deviceName').value;
            const pin = parseInt(document.getElementById('devicePin').value);
            const id = document.getElementById('deviceId').value;
            
            if(!name || isNaN(pin)) return showToast("Please enter a valid name and pin.");
            
            if (id) { 
                db.ref(`devices/${id}`).update({ name, pin }); 
                showToast("Device Saved"); 
            } else { 
                db.ref('devices').push({ name, pin, state: false }); 
                showToast("Device Added"); 
            }
            closeModal();
        });

        window.deleteDevice = id => {
            if(confirm("Are you sure you want to delete this device?")) {
                db.ref(`devices/${id}`).remove(); 
                showToast("Device Deleted");
            }
        };
    </script>
</body>
</html>
