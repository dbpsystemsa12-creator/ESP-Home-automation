<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBP Smart Home</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0812">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DBP">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --bg-base: #0a0812;
            --glass-bg: rgba(25, 15, 35, 0.6);
            --glass-border: rgba(138, 43, 226, 0.35);
            --glass-highlight: rgba(255, 255, 255, 0.1);
            --primary-purple: #8a2be2;
            --accent-pink: #d500f9;
            --text-main: #ffffff;
            --text-sub: #e0d4ff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Poppins', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 20px 80px 20px;
            overflow-x: hidden;
            user-select: none;
            position: relative;
        }

        /* 🚀 OPTIMIZATION 1: Radial Gradients instead of heavy CSS Filters */
        .ambient-orb {
            position: fixed; 
            border-radius: 50%; 
            z-index: -1; 
            opacity: 0.5;
            animation: float 12s infinite alternate ease-in-out;
            pointer-events: none; /* Prevents browser from calculating tap targets */
            will-change: transform; /* Hardware acceleration */
        }
        .orb-1 { 
            width: 450px; height: 450px; top: -100px; left: -150px; 
            background: radial-gradient(circle, rgba(138,43,226,0.5) 0%, rgba(138,43,226,0) 70%);
        }
        .orb-2 { 
            width: 550px; height: 550px; bottom: -150px; right: -200px; animation-delay: -6s; 
            background: radial-gradient(circle, rgba(213,0,249,0.5) 0%, rgba(213,0,249,0) 70%);
        }

        @keyframes float { 
            0% { transform: translate3d(0, 0, 0) scale(1); } 
            100% { transform: translate3d(30px, 40px, 0) scale(1.1); } 
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translate3d(0, 20px, 0); } 
            to { opacity: 1; transform: translate3d(0, 0, 0); } 
        }

        /* Install Banner */
        #installBanner {
            display: none; background: rgba(138, 43, 226, 0.2); border: 1px solid var(--primary-purple);
            border-radius: 16px; padding: 12px 20px; margin: 0 auto 25px; max-width: 450px;
            justify-content: space-between; align-items: center; backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateZ(0);
        }
        #installBanner span { font-size: 0.95rem; font-weight: 500; color: var(--text-main); }
        #installBtn {
            background: linear-gradient(135deg, var(--primary-purple), var(--accent-pink));
            color: white; border: none; padding: 8px 18px; border-radius: 12px;
            font-weight: 600; cursor: pointer; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(213, 0, 249, 0.4);
            touch-action: manipulation;
        }

        header { text-align: center; margin: 25px 0 35px; position: relative; }
        h1 {
            font-weight: 600; font-size: 3rem; letter-spacing: 2px; margin-bottom: 5px;
            color: #ffffff; text-shadow: 0 0 20px rgba(213, 0, 249, 0.6);
        }
        p.subtitle { color: var(--text-sub); font-size: 1.1rem; }
        
        /* Dashboard Stats Overview */
        .system-overview {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; animation: slideUp 0.4s ease-out; flex-wrap: wrap;
        }
        .stat-pill {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 12px 20px;
            display: flex; align-items: center; gap: 10px; box-shadow: inset 0 1px 1px var(--glass-highlight);
            flex: 1; min-width: 140px; justify-content: center;
            transform: translateZ(0); /* 🚀 OPTIMIZATION 2: Force GPU Rendering */
        }
        .stat-value { font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
        .stat-label { font-size: 0.9rem; color: var(--text-sub); font-weight: 400; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; transition: 0.3s ease; will-change: background-color, box-shadow; }
        .status-dot.online { background-color: #00e676; box-shadow: 0 0 12px #00e676; }

        /* Device Grid */
        .dashboard {
            display: grid; grid-template-columns: 1fr;
            gap: 20px; max-width: 600px; margin: 0 auto;
        }
        @media(min-width: 600px) {
            .dashboard { grid-template-columns: 1fr 1fr; max-width: 1000px; }
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); /* 🚀 OPTIMIZATION 3: Reduced blur intensity for performance */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px var(--glass-highlight);
            transition: border-color 0.2s;
            animation: slideUp 0.4s ease-out backwards;
            transform: translateZ(0);
            will-change: transform;
        }
        .glass-card:active { transform: scale(0.98); } /* Instant tap feedback */
        
        .card-header { display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px;}
        .device-info h2 { font-size: 1.4rem; font-weight: 500; color: var(--text-main); }
        .device-pin { 
            display: inline-block; font-size: 0.85rem; font-weight: 500;
            background: rgba(138, 43, 226, 0.25); padding: 5px 12px; border-radius: 12px; 
            color: #fff; border: 1px solid rgba(138, 43, 226, 0.5);
        }

        /* Enclosed Switch Area */
        .switch-container {
            display: flex; justify-content: space-between; align-items: center; width: 100%;
            background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }
        .switch-label { font-size: 1.1rem; font-weight: 500; color: var(--text-main); }

        /* Glowing Switch */
        .switch { position: relative; display: inline-block; width: 66px; height: 38px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1); transition: 0.3s; border-radius: 38px; 
            border: 1px solid rgba(255,255,255,0.2);
        }
        .slider:before {
            position: absolute; content: ""; height: 30px; width: 30px; left: 3px; bottom: 3px;
            background-color: #fff; transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            will-change: transform; /* 🚀 OPTIMIZATION 4: Smooth sliding */
        }
        input:checked + .slider { 
            background: linear-gradient(135deg, var(--primary-purple), var(--accent-pink)); 
            border-color: transparent; box-shadow: 0 0 15px rgba(213, 0, 249, 0.5);
        }
        input:checked + .slider:before { transform: translate3d(28px, 0, 0); }

        /* Solid, Visible Actions */
        .actions { display: flex; gap: 12px; width: 100%; margin-top: 5px; }
        .action-btn { 
            flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            color: var(--text-main); padding: 12px; border-radius: 12px; font-size: 0.95rem; 
            cursor: pointer; font-weight: 500; text-align: center;
            touch-action: manipulation;
        }
        .btn-delete { color: #ff6b6b; border-color: rgba(255, 107, 107, 0.4); background: rgba(255, 107, 107, 0.05); }

        /* Add Node Card */
        .add-card { 
            background: rgba(138, 43, 226, 0.05); border: 2px dashed rgba(213, 0, 249, 0.5); 
            cursor: pointer; justify-content: center; align-items: center; min-height: 160px; box-shadow: none;
            touch-action: manipulation;
        }
        .add-card h2 { color: var(--text-main); font-size: 1.25rem; font-weight: 500; display: flex; align-items: center; gap: 10px;}
        .add-card h2 span { color: var(--accent-pink); font-size: 1.8rem; font-weight: 600; }

        /* Smooth Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
            opacity: 0; transition: opacity 0.2s ease;
            transform: translateZ(0);
        }
        .modal.show { display: flex; opacity: 1; }
        .modal-content {
            background: var(--bg-base); border: 1px solid var(--glass-border); 
            border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            transform: scale(0.95) translate3d(0, 10px, 0); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }
        .modal.show .modal-content { transform: scale(1) translate3d(0, 0, 0); }
        .modal-content h2 { margin-bottom: 25px; font-weight: 500; color: var(--text-main); }
        .modal-content input {
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15); 
            background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem;
        }
        .modal-content input:focus { outline: none; border-color: var(--accent-pink); background: rgba(255,255,255,0.1); }
        
        .btn {
            background: linear-gradient(135deg, var(--primary-purple), var(--accent-pink)); 
            color: white; border: none; padding: 16px; border-radius: 16px; cursor: pointer; 
            font-weight: 600; width: 100%; margin-top: 15px; font-size: 1rem; 
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3); touch-action: manipulation;
        }
        .btn-cancel { background: transparent; border: 1px solid rgba(255, 77, 77, 0.5); color: #ff6b6b; box-shadow: none; margin-top: 10px; }

        /* Animated Toast */
        #toast {
            visibility: hidden; min-width: 280px; background: rgba(30, 20, 45, 0.95); 
            border: 1px solid var(--primary-purple); color: #fff; text-align: center; 
            border-radius: 16px; padding: 16px 20px; position: fixed; z-index: 2000; 
            left: 50%; bottom: 20px; transform: translate3d(-50%, 0, 0) scale(0.9); font-size: 1rem; 
            font-weight: 500; opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(8px); box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            will-change: transform, opacity;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 40px; transform: translate3d(-50%, 0, 0) scale(1); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div id="installBanner">
        <span>Install App to Home Screen</span>
        <button id="installBtn">Install</button>
    </div>

    <header>
        <h1>DBP</h1>
        <p class="subtitle">Smart Home</p>
    </header>

    <div class="system-overview">
        <div class="stat-pill">
            <div class="status-dot" id="statusDot"></div>
            <span class="stat-label" id="statusText">Connecting...</span>
        </div>
        <div class="stat-pill">
            <span class="stat-value" id="activeCount">0</span>
            <span class="stat-label" style="margin-left: 5px;">Devices ON</span>
        </div>
    </div>

    <div class="dashboard" id="devices-container">
        <div class="glass-card add-card" id="addNodeBtn" onclick="openModal()">
            <h2><span>+</span> Add Device</h2>
        </div>
    </div>

    <div class="modal" id="deviceModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Device</h2>
            <input type="hidden" id="deviceId">
            <input type="text" id="deviceName" placeholder="Device Name (e.g. Fan)">
            <input type="number" id="devicePin" placeholder="ESP32 Pin Number (e.g. 2)">
            <button class="btn" id="saveBtn">Save Device</button>
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <div id="toast">Message</div>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBanner.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBanner.style.display = 'none';
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBb3RrCnOXQ5dVuLMpynM-GyfyLwTgA83Y",
            authDomain: "home-automation-pwa-6d62d.firebaseapp.com",
            projectId: "home-automation-pwa-6d62d",
            storageBucket: "home-automation-pwa-6d62d.firebasestorage.app",
            messagingSenderId: "967454972896",
            appId: "1:967454972896:web:29fe32e6ac5038ec712985",
            measurementId: "G-2LXWPR9SFG",
            databaseURL: "https://home-automation-pwa-6d62d-default-rtdb.firebaseio.com/" 
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const container = document.getElementById('devices-container');
        const addNodeBtn = document.getElementById('addNodeBtn');
        const activeCountElem = document.getElementById('activeCount');

        db.ref('.info/connected').on('value', snap => {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            if (snap.val() === true) {
                dot.classList.add('online'); txt.innerText = "Connected";
            } else {
                dot.classList.remove('online'); txt.innerText = "Offline";
            }
        });

        db.ref('devices').on('value', snapshot => {
            let activeDevices = 0;
            snapshot.forEach(child => {
                if (child.val().state) activeDevices++;
            });
            activeCountElem.innerText = activeDevices;
        });

        db.ref('devices').on('child_added', (snapshot) => {
            const id = snapshot.key; 
            const data = snapshot.val();

            const card = document.createElement('div'); 
            card.className = 'glass-card';
            card.id = `card-${id}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="device-info">
                        <h2 id="name-${id}">${data.name}</h2>
                    </div>
                    <span class="device-pin" id="pin-${id}">Pin ${data.pin}</span>
                </div>
                
                <div class="switch-container">
                    <span class="switch-label" id="status-${id}">${data.state ? 'Status: ON' : 'Status: OFF'}</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-${id}" ${data.state ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="actions">
                    <button class="action-btn" id="edit-${id}" onclick="openModal('${id}', '${data.name}', ${data.pin})">Edit</button>
                    <button class="action-btn btn-delete" onclick="deleteDevice('${id}')">Delete</button>
                </div>
            `;
            
            container.insertBefore(card, addNodeBtn);
            
            document.getElementById(`toggle-${id}`).addEventListener('change', e => {
                db.ref(`devices/${id}`).update({ state: e.target.checked });
            });
        });

        db.ref('devices').on('child_changed', (snapshot) => {
            const id = snapshot.key; 
            const data = snapshot.val();
            
            const card = document.getElementById(`card-${id}`);
            if(card) {
                document.getElementById(`name-${id}`).innerText = data.name;
                document.getElementById(`pin-${id}`).innerText = `Pin ${data.pin}`;
                document.getElementById(`status-${id}`).innerText = data.state ? 'Status: ON' : 'Status: OFF';
                
                const toggle = document.getElementById(`toggle-${id}`);
                if(toggle.checked !== data.state) {
                    toggle.checked = data.state;
                }
                
                document.getElementById(`edit-${id}`).setAttribute('onclick', `openModal('${id}', '${data.name}', ${data.pin})`);
            }
        });

        db.ref('devices').on('child_removed', (snapshot) => {
            const id = snapshot.key;
            const card = document.getElementById(`card-${id}`);
            if(card) {
                card.remove();
            }
        });

        const modal = document.getElementById('deviceModal');
        window.openModal = (id = '', name = '', pin = '') => {
            document.getElementById('deviceId').value = id;
            document.getElementById('deviceName').value = name;
            document.getElementById('devicePin').value = pin;
            document.getElementById('modalTitle').innerText = id ? "Edit Device" : "Add Device";
            modal.classList.add('show');
        };
        window.closeModal = () => modal.classList.remove('show');

        document.getElementById('saveBtn').addEventListener('click', () => {
            const name = document.getElementById('deviceName').value;
            const pin = parseInt(document.getElementById('devicePin').value);
            const id = document.getElementById('deviceId').value;
            
            if(!name || isNaN(pin)) return showToast("Please enter a valid name and pin.");
            
            if (id) { 
                db.ref(`devices/${id}`).update({ name, pin }); 
                showToast("Device Saved"); 
            } else { 
                db.ref('devices').push({ name, pin, state: false }); 
                showToast("Device Added"); 
            }
            closeModal();
        });

        window.deleteDevice = id => {
            if(confirm("Are you sure you want to delete this device?")) {
                db.ref(`devices/${id}`).remove(); 
                showToast("Device Deleted");
            }
        };
    </script>
</body>
</html>
